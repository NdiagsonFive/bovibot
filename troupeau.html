<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoviBot — Troupeau</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F0E8;--surf:#FDFAF4;--surf2:#EDE8DC;--surf3:#E4DDD0;--brd:rgba(160,140,110,0.18);--brd2:rgba(160,140,110,0.32);--tx:#2C2416;--mu:#8C7B5E;--ac:#B8860B;--gn:#2E7D32;--rd:#C62828;--or:#E65100;--bl:#1565C0;--pu:#6A1B9A;--te:#00695C;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace}
html,body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:14px;min-height:100vh;line-height:1.5}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.s-logo{padding:22px 20px 18px;border-bottom:1px solid var(--brd)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-ico{width:32px;height:32px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-nm{font-family:var(--fh);font-size:17px;font-weight:800;letter-spacing:-.03em}
.logo-tg{font-size:10px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;padding-left:42px}
.s-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);padding:10px 8px 5px}
.ni{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--mu);font-size:13px;transition:all .15s;text-decoration:none}
.ni:hover{background:var(--surf2);color:var(--tx)}
.ni.on{background:rgba(212,168,67,.12);color:var(--ac);font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--rd);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;font-family:var(--fm)}
.s-foot{padding:14px 12px;border-top:1px solid var(--brd)}
.farm{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--surf2)}
.farm-av{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#D4A843,#A67C2E);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.farm-nm{font-size:12px;font-weight:500}.farm-sb{font-size:10px;color:var(--mu)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:10;background:rgba(245,240,232,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.tb-l h1{font-family:var(--fh);font-size:20px;font-weight:700;letter-spacing:-.02em}
.tb-l p{font-size:12px;color:var(--mu);margin-top:1px}
.tb-r{display:flex;align-items:center;gap:10px}
.tb-time{font-family:var(--fm);font-size:12px;color:var(--mu)}
.api-pill{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;font-family:var(--fm)}
.api-pill.mock{background:rgba(240,136,62,.12);color:var(--or);border:1px solid rgba(240,136,62,.25)}
.api-pill.live{background:rgba(63,185,80,.12);color:var(--gn);border:1px solid rgba(63,185,80,.25)}
.api-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.content{padding:28px 32px;display:flex;flex-direction:column;gap:20px}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.fi{padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid var(--brd2);background:var(--surf2);color:var(--mu);cursor:pointer;transition:all .15s;font-family:var(--fb)}
.fi:hover,.fi.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.search{flex:1;max-width:300px;padding:7px 14px;border-radius:20px;border:1px solid var(--brd2);background:var(--surf);font-family:var(--fb);font-size:13px;color:var(--tx);outline:none}
.search:focus{border-color:var(--ac)}
.panel{background:var(--surf);border:1px solid var(--brd);border-radius:12px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--brd)}
.pt{font-family:var(--fh);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.pdot{width:7px;height:7px;border-radius:50%}
.rbtn{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);cursor:pointer;background:none;border:none;font-family:var(--fb);transition:color .15s}
.rbtn:hover{color:var(--tx)}
.rbtn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--brd)}
thead th{text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);font-weight:500}
tbody tr{border-bottom:1px solid var(--brd);transition:background .1s;cursor:pointer}
tbody tr:hover{background:var(--surf2)}
tbody tr:last-child{border-bottom:none}
td{padding:11px 16px;font-size:13px}
.bid{font-family:var(--fm);color:var(--ac);font-size:12px}
.rbadge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surf2);color:var(--mu);border:1px solid var(--brd2)}
.sdot2{display:inline-flex;align-items:center;gap:5px;font-size:12px}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd.ok{background:var(--gn)}.sd.gest{background:var(--ac)}.sd.al{background:var(--rd)}
.gmqbar{width:60px;height:5px;border-radius:3px;background:var(--surf2);overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.gmqfill{height:100%;border-radius:3px}
.empty{text-align:center;padding:40px;color:var(--mu)}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{background:linear-gradient(90deg,var(--surf2) 25%,var(--surf3) 50%,var(--surf2) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="s-logo">
    <div class="logo-row">
      <div class="logo-ico"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 14c0-2.5 1.5-4.5 4-5.5M13 8.5c2.5 1 4 3 4 5.5M10 4a2 2 0 100 4 2 2 0 000-4z" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/><path d="M5 16.5c0-2.8 2.24-5 5-5s5 2.2 5 5" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/></svg></div>
      <span class="logo-nm">BoviBot</span>
    </div>
    <div class="logo-tg">Gestion intelligente</div>
  </div>
  <nav class="s-nav">
    <span class="nl">Principal</span>
    <a class="ni" href="index.html"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>Tableau de bord</a>
    <a class="ni on" href="troupeau.html"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>Troupeau</a>
    <a class="ni" href="gestations.html"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2 2"/></svg>Gestations</a>
    <span class="nl">Suivi</span>
    <a class="ni" href="alertes.html"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 2v2M8 12v2M2 8h2M12 8h2"/><circle cx="8" cy="8" r="3"/></svg>Alertes<span class="nbadge" id="nb-count">—</span></a>
    <span class="nl">IA</span>
    <a class="ni" href="chat.html"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 12V5a2 2 0 012-2h8a2 2 0 012 2v5a2 2 0 01-2 2H9l-3 2v-2H4a2 2 0 01-2-2z"/></svg>Chat BoviBot</a>
  </nav>
  <div class="s-foot"><div class="farm"><div class="farm-av">FD</div><div><p class="farm-nm">Ferme Diallo</p><p class="farm-sb">Thiès · <span id="farm-count">—</span> bovins</p></div></div></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-l"><h1>🐄 Troupeau</h1><p id="subtitle">Chargement…</p></div>
    <div class="tb-r">
      <div class="api-pill mock" id="api-pill"><span class="api-dot"></span><span id="api-lbl">MODE DÉMO</span></div>
      <span class="tb-time" id="live-time">--:--:--</span>
    </div>
  </div>
  <div class="content">
    <div class="filters">
      <input class="search" id="search" placeholder="🔍 Rechercher par nom, tag, race…" oninput="filterTable()">
      <button class="fi on" onclick="setFilter('tous')">Tous</button>
      <button class="fi" onclick="setFilter('actif')">Actifs</button>
      <button class="fi" onclick="setFilter('gestation')">Gestation</button>
      <button class="fi" onclick="setFilter('quarantaine')">Quarantaine</button>
      <button class="fi" onclick="setFilter('vendu')">Vendus</button>
    </div>
    <div class="panel">
      <div class="ph">
        <span class="pt"><span class="pdot" style="background:var(--bl)"></span>Liste des animaux</span>
        <button class="rbtn" id="rbtn" onclick="loadBovins(true)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10.5 6A4.5 4.5 0 112.3 3.2M2 1v2.5H4.5"/></svg>Actualiser
        </button>
      </div>
      <div class="tw">
        <table>
          <thead><tr><th>Tag</th><th>Nom</th><th>Race</th><th>Sexe</th><th>Âge</th><th>Poids (kg)</th><th>GMQ (g/j)</th><th>Statut</th></tr></thead>
          <tbody id="tbody">
            <tr><td colspan="8"><div class="skel" style="height:13px;margin:12px 16px"></div></td></tr>
            <tr><td colspan="8"><div class="skel" style="height:13px;margin:12px 16px"></div></td></tr>
            <tr><td colspan="8"><div class="skel" style="height:13px;margin:12px 16px"></div></td></tr>
            <tr><td colspan="8"><div class="skel" style="height:13px;margin:12px 16px"></div></td></tr>
            <tr><td colspan="8"><div class="skel" style="height:13px;margin:12px 16px"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</div>
<script>
const BASE_URL = "https://web-production-8a06a5.up.railway.app";
const MOCK = [
  {numero_tag:"BV-001",nom:"Fatou",   race:"Zébu Gobra",sexe:"F",age_mois:24,poids_actuel:382,gmq_kg_jour:0.82,statut:"actif"},
  {numero_tag:"BV-004",nom:"Ndéye",   race:"Taurin",    sexe:"F",age_mois:18,poids_actuel:295,gmq_kg_jour:0.64,statut:"actif"},
  {numero_tag:"BV-009",nom:"Aminata", race:"Zébu Gobra",sexe:"F",age_mois:36,poids_actuel:410,gmq_kg_jour:0.89,statut:"actif"},
  {numero_tag:"BV-014",nom:"Kebbe",   race:"Métis",     sexe:"M",age_mois:8, poids_actuel:58, gmq_kg_jour:0.21,statut:"actif"},
  {numero_tag:"BV-021",nom:"Rokhaya", race:"Zébu Gobra",sexe:"F",age_mois:30,poids_actuel:348,gmq_kg_jour:0.75,statut:"actif"},
  {numero_tag:"BV-027",nom:"Soda",    race:"Taurin",    sexe:"F",age_mois:22,poids_actuel:310,gmq_kg_jour:0.60,statut:"actif"},
  {numero_tag:"BV-032",nom:"Diara",   race:"Zébu Gobra",sexe:"F",age_mois:28,poids_actuel:365,gmq_kg_jour:0.78,statut:"actif"},
];

let allData = [];
let currentFilter = 'tous';

const stMap = {actif:'ok',gestation:'gest',quarantaine:'al',mort:'al',vendu:'al'};
const stLbl = {actif:'Actif',gestation:'Gestation',quarantaine:'Quarantaine',mort:'Mort',vendu:'Vendu'};

function spin(on){ document.getElementById('rbtn').classList.toggle('spin',on); }

async function loadBovins(manual=false){
  spin(true);
  let data;
  try {
    const r = await fetch(BASE_URL+'/api/animaux');
    if(!r.ok) throw new Error(r.status);
    data = await r.json();
    document.getElementById('api-pill').className='api-pill live';
    document.getElementById('api-lbl').textContent='EN DIRECT';
  } catch(e) {
    data = MOCK;
    document.getElementById('api-pill').className='api-pill mock';
    document.getElementById('api-lbl').textContent='MODE DÉMO';
  }
  allData = data;
  document.getElementById('farm-count').textContent = data.length;
  document.getElementById('subtitle').textContent = data.length + ' animaux trouvés';
  renderTable();
  spin(false);
}

function renderTable(){
  const search = document.getElementById('search').value.toLowerCase();
  let rows = allData.filter(b => {
    const matchFilter = currentFilter === 'tous' || b.statut === currentFilter;
    const matchSearch = !search ||
      (b.numero_tag||'').toLowerCase().includes(search) ||
      (b.nom||'').toLowerCase().includes(search) ||
      (b.race||'').toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  if(rows.length === 0){
    document.getElementById('tbody').innerHTML = `<tr><td colspan="8"><div class="empty">Aucun animal trouvé</div></td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML = rows.map(b => {
    const gmq   = b.gmq_kg_jour != null ? Math.round(b.gmq_kg_jour*1000) : (b.gmq ?? 0);
    const poids = b.poids_actuel ?? b.poids ?? 0;
    const age   = b.age_mois != null ? (b.age_mois >= 12 ? Math.floor(b.age_mois/12)+'a '+( b.age_mois%12)+'m' : b.age_mois+'m') : '—';
    const pct   = Math.min(100, Math.round(gmq/10));
    const gc    = gmq < 400 ? 'var(--rd)' : gmq < 600 ? 'var(--ac)' : 'var(--gn)';
    const st    = b.statut ?? 'actif';
    return `<tr>
      <td><span class="bid">${b.numero_tag??''}</span></td>
      <td><strong>${b.nom??''}</strong></td>
      <td><span class="rbadge">${b.race??''}</span></td>
      <td>${b.sexe==='F'?'♀ Femelle':'♂ Mâle'}</td>
      <td>${age}</td>
      <td style="${st==='quarantaine'?'color:var(--rd);font-weight:600':''}">${poids}</td>
      <td>${gmq} <span class="gmqbar"><span class="gmqfill" style="width:${pct}%;background:${gc}"></span></span></td>
      <td><span class="sdot2"><span class="sd ${stMap[st]||'ok'}"></span>${stLbl[st]||st}</span></td>
    </tr>`;
  }).join('');
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.fi').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  renderTable();
}

function filterTable(){ renderTable(); }

function tick(){ document.getElementById('live-time').textContent = new Date().toLocaleTimeString('fr-FR'); }
tick(); setInterval(tick,1000);
loadBovins();
</script>
</body>
</html>
